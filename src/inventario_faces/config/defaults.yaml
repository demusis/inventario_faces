app:
  name: "Inventario Faces"
  output_directory_name: "inventario_faces_output"
  report_title: "Relat\u00f3rio Forense de Invent\u00e1rio Facial"
  organization: "Laborat\u00f3rio de An\u00e1lise Digital"
  log_level: "INFO"
  use_local_temp_copy: false

media:
  image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".bmp"
    - ".tif"
    - ".tiff"
    - ".webp"
  video_extensions:
    - ".mp4"
    - ".avi"
    - ".mkv"
    - ".dav"
    - ".mov"
    - ".wmv"
    - ".mpeg"
    - ".mpg"

video:
  # Padrao pericial: cobertura temporal mais densa, sem truncamento silencioso de videos longos.
  sampling_interval_seconds: 1.0
  # Use null para percorrer o video inteiro conforme o intervalo de amostragem.
  max_frames_per_video: null
  # Distancia temporal minima entre keyframes consecutivos do mesmo track.
  keyframe_interval_seconds: 3.0
  # Limiar um pouco mais sensivel para registrar mudancas relevantes com maior auditabilidade.
  significant_change_threshold: 0.15

face_model:
  backend: "insightface"
  model_name: "buffalo_l"
  # Padrao pericial: inferencia em CPU para favorecer estabilidade e reprodutibilidade entre estacoes.
  det_size:
    - 800
    - 800
  minimum_face_quality: 0.68
  minimum_face_size_pixels: 48
  ctx_id: -1
  providers:
    - "CPUExecutionProvider"

clustering:
  # Padrao pericial: thresholds mais conservadores para reduzir fusoes indevidas.
  assignment_similarity: 0.62
  # Similaridade a partir da qual grupos distintos viram sugestao de revisao.
  candidate_similarity: 0.56
  # Quantidade minima de tracks para um grupo aparecer na saida final.
  min_cluster_size: 1
  # Quantidade minima de ocorrencias para um track entrar no clustering.
  min_track_size: 1

tracking:
  # Padrao pericial: maior exigencia de identidade e maior cautela na associacao temporal.
  iou_threshold: 0.10
  spatial_distance_threshold: 0.15
  embedding_similarity_threshold: 0.58
  minimum_total_match_score: 0.45
  geometry_weight: 0.35
  embedding_weight: 0.65
  max_missed_detections: 2
  confidence_margin: 0.08
  representative_embeddings_per_track: 8
  top_crops_per_track: 6
  quality_improvement_margin: 0.04

enhancement:
  enable_preprocessing: true
  # Padrao pericial: realce moderado e auditavel, aplicado apenas sobre derivados.
  minimum_brightness_to_enhance: 0.40
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: 8
  gamma: 1.10
  denoise_strength: 2

search:
  enabled: true
  prefer_faiss: true
  coarse_top_k: 12
  refine_top_k: 20

distributed:
  enabled: false
  execution_label: "compartilhado"
  node_name: null
  # Frequencia dos heartbeats gravados pelo no no lote compartilhado.
  heartbeat_interval_seconds: 10
  # Janela para considerar lock/heartbeat abandonado e permitir retomada.
  stale_lock_timeout_minutes: 180
  # Quando true, a instancia que perceber o lote completo tenta consolidar o resultado final.
  auto_finalize: true
  # Valida existencia, consistencia estrutural e hash interno dos parciais antes da consolidacao.
  validate_partial_integrity: true
  # Reprocessa automaticamente apenas os parciais ausentes/corrompidos detectados na validacao.
  auto_reprocess_invalid_partials: true

reporting:
  compile_pdf: true
  # Padrao pericial: maior densidade de detalhamento por grupo.
  max_tracks_per_group: 12

forensics:
  chain_of_custody_note: "Os arquivos originais nao foram alterados. Todos os hashes SHA-512 foram calculados em modo somente leitura, as derivacoes foram armazenadas separadamente para auditoria e os resultados de deteccao, agrupamento e busca devem ser interpretados como probabilisticos, sujeitos a revisao tecnica pericial."
